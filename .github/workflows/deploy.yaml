name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/cjwillis48/ragr:latest
            ghcr.io/cjwillis48/ragr:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          IMAGE="ghcr.io/cjwillis48/ragr:main-${SHORT_SHA}"
          sed -i "s|image: ghcr.io/cjwillis48/ragr:.*|image: ${IMAGE}|g" k8s/ragr/deployment.yaml

      - name: Commit updated manifest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/ragr/deployment.yaml
          git diff --staged --quiet || git commit -m "deploy: update image to main-${SHORT_SHA}"
          git push

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragr
  namespace: ragr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ragr
  template:
    metadata:
      labels:
        app: ragr
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: migrate
          image: ghcr.io/cjwillis48/ragr:0.1.0-dev.2f2fe3a
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: DATABASE_URL
      containers:
        - name: ragr
          image: ghcr.io/cjwillis48/ragr:0.1.0-dev.2f2fe3a
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: ANTHROPIC_API_KEY
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: VOYAGE_API_KEY
            - name: RAGR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: RAGR_API_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: ENCRYPTION_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: CLERK_SECRET_KEY
            - name: CONSOLE_ORIGINS
              value: '["https://ragr.charliewillis.com"]'
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 1Gi
              cpu: 500m

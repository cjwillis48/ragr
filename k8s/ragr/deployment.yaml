apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragr
  namespace: ragr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ragr
  template:
    metadata:
      labels:
        app: ragr
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrate
          image: ghcr.io/cjwillis48/ragr:0.3.0-dev.ba6e1b2
          command: ["alembic", "upgrade", "head"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 250m
      containers:
        - name: ragr
          image: ghcr.io/cjwillis48/ragr:0.3.0-dev.ba6e1b2
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: ANTHROPIC_API_KEY
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: VOYAGE_API_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: ENCRYPTION_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: CLERK_SECRET_KEY
            - name: CONSOLE_ORIGINS
              value: '["https://ragr.charliewillis.com"]'
            - name: R2_ACCOUNT_ID
              value: "0a5f0f60df717358942f04cca4d61c3a"
            - name: R2_BUCKET_NAME
              value: "ragr-uploads"
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ragr-secrets
                  key: R2_SECRET_ACCESS_KEY
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 1Gi
              cpu: 500m
